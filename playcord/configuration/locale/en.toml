# =============================================================================
# FIRST TIME USER TUTORIAL
# =============================================================================
[tutorial]
title = "Welcome to {name}!"
description = "Looks like this is your first time playing! Here's a quick guide to get you started."

[tutorial.fields.how_games_work]
name = "How Games Work"
value = """1. Join or Create - Join a lobby or create one with {command:play}
2. Wait for Players - Once enough players join, the creator starts the game
3. Play! - Follow the on-screen buttons and instructions to play"""

[tutorial.fields.ratings]
name = "Ratings & Leaderboards"
value = """Every rated game affects your skill rating. Win games to climb the leaderboard!
Check your stats anytime with {command:playcord profile}."""

[tutorial.fields.tips]
name = "Pro Tips"
value = """• Buttons are generally faster than commands where available.
• Invite friends with {command:playcord invite}
• Need help? Use {command:playcord help} anytime"""

[tutorial.fields.ready_to_play]
name = "Ready to Play {game_name}?"
value = "Good luck and have fun!"


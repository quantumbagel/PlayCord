# PlayCord English Localization File
# All user-facing strings are organized hierarchically for easy localization.
# Use {variable} syntax for dynamic content formatted at runtime.
# Use {command:play} / {command:playcord help} to render clickable slash-command mentions.

[meta]
language = "English"
code = "en"
version = "1.0.0"
author = "quantumbagel"

# =============================================================================
# BRANDING & GENERAL
# =============================================================================
[brand]
name = "PlayCord"
tagline = "Turn-based games for Discord"
footer = "Made with ❤ by @quantumbagel"
footer_icon = "https://avatars.githubusercontent.com/u/58365715"
github_url = "https://github.com/PlayCord/bot"
readme_url = "https://github.com/PlayCord/bot/blob/master/README.md"

# =============================================================================
# SHARED UI FRAGMENTS
# =============================================================================
[common]
empty_markdown = "_(none)_"

# =============================================================================
# WELCOME MESSAGE (when bot joins a server)
# =============================================================================
[welcome]
title = "👋 Welcome to {name}!"
description = """Thanks for adding me! I'm a Discord bot for playing turn-based games with friends.

**Quick Start:**
• {command:play} - Start a new game
• {command:playcord catalog} - Browse all games
• {command:playcord help} - Interactive help menu"""

[welcome.fields.games]
name = "Available Games"
value = "I have over 10 games including Tic-Tac-Toe, Connect Four, Chess, Poker, and more! Each game tracks your rating so you can compete for the leaderboard."

[welcome.fields.rating]
name = "Rating System"
value = "Every game has a skill-based rating system. Win games to climb the leaderboard and show off your skills!"

[welcome.fields.help]
name = "Need Help?"
value = "Use {command:playcord help} for an interactive guide, or check out our [GitHub]({github_url}) for documentation."

[welcome.fields.playcord_channel]
name = "Optional: dedicated channel"
value = "Administrators can run {command:playcord set_channel} in the channel where you want matchmaking to live when your server enforces a single PlayCord channel."

[playcord]
wrong_channel = "On this server, start games from {channel}."
active_thread_command_restricted = "This is an active game thread. Use move commands or {command:playcord forfeit} here."

[rematch]
not_participant = "Only players from that match can start a rematch."
someone_busy = "Someone from that game is already in another active match."
bad_channel = "Use rematch from a server text channel."
unknown_game = "Could not resolve the game type for that match."
failed = "Could not open a rematch lobby."
created = "Rematch lobby posted in this channel."
member_missing = "{mention} is not in this server — everyone from the last game must still be here to rematch."
db_failed = "Could not load player data for rematch."

[commands.replay]
description = "View an interactive replay for a completed match in this server"
param_match_ref = "Public match code (thread title) or legacy numeric match id"
title = "Replay · {id} · {game}"
no_data = "No replay log available for `{match_display}`.\n\nReplays are only stored for games that complete normally (not crashes)."
empty_page = "Empty page."
unavailable = "Interactive replay is unavailable for this game or replay."
nav_first = "⏮ First"
nav_prev = "◀ Prev"
nav_next = "Next ▶"
nav_last = "Last ⏭"
move_indicator = "Move {current}/{max}"
seek_placeholder = "Jump to move..."
seek_option = "Move {move}"

[commands.feedback]
description = "Send feedback to the bot owners"
param_message = "Your message (max 500 characters)"
thanks = "Thanks, your feedback was delivered."
too_long = "Please keep feedback under {max} characters."
empty = "Please enter a non-empty message."
delivery_failed = "Failed to send feedback. Try again later."

[commands.set_channel]
description = "Set or clear the channel where {command:play} must be used when the server requires it"
param_channel = "Text channel, or leave empty to clear"
guild_only = "Use this command in a server."
cleared = "PlayCord channel setting cleared for this server."
saved = "PlayCord channel set to {channel}."

[commands.analytics]
embed_title = "Analytics — last {hours}h"
embed_description = "Bar chart: **event types** (left) and **games** (right)."
embed_no_chart = "No type/game totals in this window; recent rows are below."
embed_recent_title = "Recent events"
field_recent = "Recent events"
recent_truncated_note = "_Older rows omitted (embed size limit)._"
chart_suptitle = "Analytics — last {hours} hour(s)"
chart_events_title = "By event type"
chart_games_title = "By game"
chart_empty_panel = "No data"
chart_xlabel_count = "Count"
message_usage = "Usage: `{prefix}analytics [hours]` — default window 24 hours, max 720."
message_empty = "No analytics rows in the last {hours} hour(s)."
message_title = "**Analytics** — last **{hours}** hour(s)"
message_counts_header = "**Counts by type** (bar = share of max in this table)"
message_by_game_header = "**Counts by game_type** (non-null only)"
message_recent_header = "**Recent events** (newest first)"

[commands.treediff]
embed_title = "Command tree (local vs API)"
embed_description_stats = "**{local_n}** leaves locally · **{remote_n}** on the API · drift **+{n_add}** / **−{n_rem}** / **~{n_mod}**"
field_local_leaves = "Local"
field_remote_leaves = "API"
field_drift_totals = "+ / − / ~"
field_added = "Added locally"
field_removed = "Missing on API"
field_modified_cmds = "Modified"
field_more_modified = "More changes"
more_modified_detail = "**{n}** more modified command(s) not expanded below (see the **Modified** column for names)."
message_usage = "Usage: `{prefix}treediff` (global tree) or `{prefix}treediff this` / `{prefix}treediff <guild_id>`."
message_failed = "Could not fetch or compare slash commands with Discord."
need_guild = "Use `treediff this` in a server, or pass a guild id."

[commands.treediff.report]
title = "### Command tree (local vs API)\n"
all_local = "**All registered locally ({count}):**"
all_remote = "**All registered remotely ({count}):**"
separator = "---"
section_diff = "**Diff**"
added_header = "**Added locally (not on API):**"
removed_header = "**Removed from API (not local):**"
modified_none = "**Modified:** _none_"
modified_header = "**Modified:**"
truncated = "… _(truncated)_"

[commands.treediff.diff]
command_description_modified = "Command description was modified"
parameter_set_mismatch = "Parameter set mismatch (local: {local_names}; remote: {remote_names})"
param_description_modified = "Parameter '{name}' description was modified"
param_required_modified = "Parameter '{name}' required status was modified"
param_type_modified = "Parameter '{name}' type was modified"

[commands.admin]
task_unexpected_error = "An unexpected error ran while handling this admin command."
sync_failed = "Could not sync slash commands ({error_type})."
sync_usage = "Invalid argument. Usage: `{prefix}sync` (global), `{prefix}sync this`, or `{prefix}sync <guild_id>`."
clear_usage = "Invalid argument. Usage: `{prefix}clear` (global), `{prefix}clear this`, or `{prefix}clear <guild_id>`."
guild_required_for_this = "Use `this` only in a server channel, or pass a numeric guild id."
dbreset_all_title = "Database reset complete"
dbreset_all_description = "Dropped and recreated the full database schema, then rebuilt tracked assets."
dbreset_game_title = "Game reset complete"
dbreset_game_description = "Deleted all rows related to game `{entity_id}` and recreated `{game_name}` as game id `{game_id}`."
dbreset_user_title = "User reset complete"
dbreset_user_description = "Deleted all rows related to user `{entity_id}` and recreated a blank user record."
dbreset_guild_title = "Guild reset complete"
dbreset_guild_description = "Deleted all rows related to guild `{entity_id}` and recreated a blank guild record."

# =============================================================================
# BOT STARTUP (logging; English operators may still translate for consistency)
# =============================================================================
[startup]
auto_sync_commands_ok = "auto_sync_commands: synced {count} global slash command(s)."
auto_sync_commands_failed = "auto_sync_commands failed: {error}"
compare_command_tree_drift_intro = "compare_command_tree_on_startup: slash tree differs from API —"
compare_command_tree_ok = "compare_command_tree_on_startup: global slash tree matches API."
compare_command_tree_failed = "compare_command_tree_on_startup failed: {error}"

# =============================================================================
# BOT STATUS / PRESENCE
# =============================================================================
[presence]
catalog_games = "{count} games • /playcord catalog to list"
users_playing = "{count} users playing • /playcord stats for stats"
users_matchmaking = "{count} users matchmaking • /play to start a game"
games_happening_now = "{count} games happening now • /play to start a game"

# =============================================================================
# COMMANDS - DESCRIPTIONS (shown in Discord autocomplete)
# =============================================================================
[commands.help]
description = "Interactive help menu - learn how to use PlayCord!"
param_topic = "Jump directly to a specific help topic"
choice_getting_started = "Getting Started (New Users)"
choice_commands = "Commands Reference"
choice_games = "Available Games"

[commands.learn]
description = "Learn how to play a specific game"
param_game = "The game you want to learn about"

[commands.invite]
description = "Invite players to your game lobby (can start a new lobby if not in one)"
param_user = "First player to invite (optional)"
param_game = "The game to start (only needed if you're not already in a lobby)"
param_user2 = "Second player to invite (optional)"
param_user3 = "Third player to invite (optional)"
param_user4 = "Fourth player to invite (optional)"
param_user5 = "Fifth player to invite (optional)"
param_bot1 = "First bot difficulty to add (optional)"
param_bot2 = "Second bot difficulty to add (optional)"
param_bot3 = "Third bot difficulty to add (optional)"
param_bot4 = "Fourth bot difficulty to add (optional)"
param_bot5 = "Fifth bot difficulty to add (optional)"

[commands.play]
description = "Start a new game lobby"
param_game = "The game you want to play"
did_you_mean = "Did you mean {command:play} {game}?"

[commands.kick]
description = "Remove a player from your lobby (they can rejoin)"
param_user = "The player to kick from the lobby"
param_reason = "Optional reason for kicking (shown to the player)"

[commands.ban]
description = "Ban a player from your lobby (they cannot rejoin)"
param_user = "The player to ban from the lobby"
param_reason = "Optional reason for the ban (shown to the player)"

[commands.stats]
description = "View bot statistics and server information"

[commands.about]
description = "Learn about PlayCord and its creators"

[commands.leaderboard]
description = "View the top-ranked players for any game"
param_game = "The game to view rankings for"
param_scope = "Server leaderboard (local) or Global leaderboard (all servers)"
param_page = "Page number to view"
choice_server = "Server"
choice_global = "Global"

[commands.catalog]
description = "Browse all available games with details and difficulty ratings"
param_page = "Page number (each page shows 3 games)"

[commands.profile]
description = "View your stats, ratings, and match history"
param_user = "The player to view (leave empty for yourself)"

[commands.history]
description = "View a player's per-game match history and rating trend."
param_game = "Game to inspect"
param_user = "The user to view (defaults to yourself)"
param_page = "Page number for match history"
param_days = "Days included in trend graph (1-365)"

[commands.settings]
description = "Change settings for your current game lobby"
param_rated = "Whether the game should be rated"
param_private = "Whether the game should be private"

[commands.bot]
description = "Manage bots in your lobby"
not_in_lobby = "You need to be in a game lobby to use this command. Start a new game with {command:play} or join an existing lobby first."
only_creator = "Only the lobby creator can manage bots."
available_difficulties = "Available Difficulties"
queued_bots = "Queued Bots"
no_queued_bots = "No bots currently queued"
added = "Added bot with difficulty `{difficulty}`"
added_multiple = "Added {count} bot(s) with difficulty `{difficulty}`"
removed = "Removed bot `{name}`"

[commands.bot.list]
description = "Show available bot difficulties and queued bots"

[commands.bot.add]
description = "Add one or more bots to your lobby"
param_difficulty = "The difficulty level of the bot to add"
param_number = "How many bots of this difficulty to add (default: 1)"
error_invalid_number = "The number of bots must be at least 1"

[commands.bot.remove]
description = "Remove a bot from your lobby"
param_name = "The name of the bot to remove"

[commands.group]
description = "Everything that isn't a game."

# =============================================================================
# HELP EMBEDS
# =============================================================================
[help.main]
title = "📚 {name} Help Center"
description = """Welcome to **{name}**! I'm your friendly game bot for Discord.

Use the buttons below to explore different topics, or try these quick commands:
• {command:play} - Start a new game
• {command:playcord catalog} - Browse all games
• {command:playcord profile} - View your stats"""

[help.main.fields.getting_started]
name = "Getting Started"
value = "New here? Click **Getting Started** below!"

[help.main.fields.game_list]
name = "Game List"
value = "See all available games"

[help.main.fields.commands]
name = "Commands"
value = "Full command reference"

[help.getting_started]
title = "Getting Started with {name}"
description = "Let's get you playing in under a minute!"

[help.getting_started.fields.step1]
name = "Step 1: Start a Game"
value = """Use {command:play} to create a new game lobby.
Example: {command:play} tictactoe

Not sure which game? Try {command:playcord catalog} to browse!"""

[help.getting_started.fields.step2]
name = "Step 2: Invite Friends (Optional)"
value = """Your lobby is open to anyone by default.
• Public game: Anyone can click Join
• Invite players: Use {command:playcord invite}"""

[help.getting_started.fields.step3]
name = "Step 3: Play!"
value = """Once enough players join, click Start to begin.
Follow the on-screen instructions to make your moves!"""

[help.getting_started.fields.tips]
name = "Pro Tips"
value = """• Games track your rating - compete for the leaderboard!
• Use {command:playcord profile} to see your stats
• Click buttons instead of typing when available"""

[help.commands]
title = "Command Reference"
description = "Here are all the commands you can use:"

[help.commands.fields.playing]
name = "Playing Games"
value = """{command:play} - Start a new game
{command:playcord catalog} - Browse all games
{command:playcord invite} - Invite to your lobby
{command:playcord kick} - Remove from lobby
{command:playcord ban} - Ban from lobby"""

[help.commands.fields.stats]
name = "Stats & Rankings"
value = """{command:playcord profile} - View player stats
{command:playcord leaderboard} - Top players
{command:playcord history} - Your recent matches (includes match IDs)
{command:playcord replay} - Paginated move log for a match in this server"""

[help.commands.fields.info]
name = "Information"
value = """{command:playcord help} - This help menu
{command:playcord about} - About the bot
{command:playcord stats} - Bot statistics
{command:playcord feedback} - Send feedback to the team"""

[help.game_info]
title = "How to Play: {game_name}"
field_players = "👥 Players"
field_duration = "⏰ Duration"
field_difficulty = "📈 Difficulty"
field_quick_start = "▶️ Quick Start"
field_quick_start_value = "Type {command:play} to start a game!"
field_author = "👤 Created by"
field_learn_more = "📚 Learn More"
field_learn_more_value = "[Open full guide](https://playcord.github.io/learn/{game_id})"
players_format = "{count} players"
players_range_format = "{min}-{max} players"
no_description = "No description available."
unknown = "Unknown"

[help.games_overview]
title = "Available Games"
description = "Here's a quick overview of what you can play:"
field_games = "Games"
field_tip = "Tip"
tip_value = "Use the buttons below for tutorials, or {command:playcord catalog} for more detail."
game_entry = "• **{game_name}** ({command:play})"
more_games = "*...and {count} more!*"

[help.faq]
title = "FAQ"
description = "Quick answers to common PlayCord questions."

[help.faq.fields.play_again]
name = "How do I start a game?"
value = "Run {command:play} in a server text channel, then invite friends or wait for others to join."

[help.faq.fields.channel]
name = "Why can't I start a game here?"
value = "Some servers set a dedicated PlayCord channel with {command:playcord set_channel}. Start games there if your server configured one."

[help.faq.fields.replay]
name = "How do I review old matches?"
value = "Use {command:playcord history} to browse recent matches, then {command:playcord replay} to inspect moves."

[help.faq.fields.private_info]
name = "What does Peek do?"
value = "Peek is only shown for games with hidden player information. It lets players re-open their own private state."

[help.tutorials]
title = "Game Tutorials"
description = "Pick a game below to see its quick rules, player count, and how to start it."

